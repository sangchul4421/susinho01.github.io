<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영수증 자동 파일명 변환기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 600px;
      margin: auto;
    }

    .card-title { font-size: 1.25rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.4rem; }
    .card-desc  { font-size: 0.85rem; color: #9a9aaa; margin-bottom: 1.6rem; }

    /* ── API 키 섹션 ── */
    .api-section { margin-bottom: 1.4rem; }
    .api-label {
      display: block; font-size: 0.76rem; font-weight: 500;
      color: #666; margin-bottom: 0.35rem;
    }
    .api-wrap { position: relative; display: flex; align-items: center; }
    .api-input {
      width: 100%; padding: 0.62rem 2.6rem 0.62rem 0.9rem;
      font-size: 0.86rem; font-family: inherit;
      color: #1a1a2e; background: #fafbff;
      border: 1.5px solid #dde1f0; border-radius: 8px;
      outline: none; transition: border-color 0.2s;
    }
    .api-input:focus { border-color: #4a6cf7; background: #fff; }
    .btn-eye {
      position: absolute; right: 0.6rem;
      background: none; border: none; cursor: pointer;
      font-size: 1rem; color: #aaa; padding: 0.2rem;
      line-height: 1; transition: color 0.2s; user-select: none;
    }
    .btn-eye:hover { color: #4a6cf7; }
    .api-error {
      display: none; margin-top: 0.5rem;
      font-size: 0.76rem; color: #e05c5c;
    }

    /* ── 업로드 존 ── */
    .upload-zone {
      border: 2px dashed #c8ccd8;
      border-radius: 12px;
      padding: 1.8rem 1.5rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      background: #fafbff;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: #4a6cf7; background: #f0f3ff; }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { font-size: 2.2rem; margin-bottom: 0.5rem; }
    .upload-text { font-size: 0.88rem; font-weight: 500; color: #3a3a4a; margin-bottom: 0.2rem; }
    .upload-hint { font-size: 0.73rem; color: #b0b4c4; }
    .upload-hint span { color: #4a6cf7; font-weight: 500; }

    /* ── 파일 카운트 바 ── */
    .count-bar {
      display: none; margin-top: 1rem;
      padding: 0.6rem 1rem;
      background: #f0f3ff; border: 1px solid #d0d8ff; border-radius: 8px;
      align-items: center; justify-content: space-between;
    }
    .count-bar.show { display: flex; }
    .count-text { font-size: 0.82rem; font-weight: 500; color: #4a6cf7; }
    .btn-reset {
      font-size: 0.75rem; color: #9a9aaa;
      background: none; border: none; cursor: pointer;
      font-family: inherit; padding: 0.2rem 0.5rem;
      border-radius: 4px; transition: background 0.2s;
    }
    .btn-reset:hover { background: #e0e6ff; color: #4a6cf7; }

    /* ── 자동생성 버튼 ── */
    .action-row { display: none; margin-top: 0.8rem; }
    .action-row.show { display: block; }
    .btn-generate {
      width: 100%; padding: 0.85rem;
      background: #4a6cf7; color: white;
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.93rem; font-weight: 500;
      border: none; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-generate:hover:not(:disabled) {
      background: #3a5ce5;
      box-shadow: 0 6px 20px rgba(74,108,247,0.35);
      transform: translateY(-2px);
    }
    .btn-generate:disabled { background: #c8ccd8; cursor: not-allowed; transform: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: none; width: 15px; height: 15px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    .spinner-sm {
      display: inline-block; width: 11px; height: 11px;
      border: 1.5px solid rgba(74,108,247,0.25); border-top-color: #4a6cf7;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 0.3rem; flex-shrink: 0;
    }

    /* ── 전체 진행률 ── */
    .progress-area {
      display: none; margin-top: 1rem;
      padding: 0.85rem 1rem;
      background: #f8f9ff; border: 1px solid #dde1f8; border-radius: 10px;
    }
    .progress-status { font-size: 0.79rem; font-weight: 500; color: #4a6cf7; margin-bottom: 0.45rem; }
    .progress-bar-wrap { width: 100%; height: 6px; background: #e0e4f8; border-radius: 3px; overflow: hidden; }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #4a6cf7, #7a9cff);
      border-radius: 3px; transition: width 0.3s ease;
    }

    /* ── 결과 목록 ── */
    .result-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.2rem; }

    /* ── 결과 카드 ── */
    .result-card {
      border: 1px solid #e8eaf0; border-radius: 12px;
      padding: 0.9rem; background: #fff;
      display: flex; gap: 0.8rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .result-card.processing { border-color: #b8c8ff; background: #f8f9ff; }
    .result-card.done       { border-color: #b8dfc8; }
    .result-card.error      { border-color: #ffc0c0; background: #fff8f8; }

    .card-thumb {
      width: 72px; height: 72px; min-width: 72px;
      object-fit: cover; border-radius: 8px;
      border: 1px solid #e8eaf0; background: #f5f5fb;
      align-self: flex-start;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-header {
      display: flex; align-items: center; gap: 0.4rem;
      margin-bottom: 0.35rem; flex-wrap: wrap;
    }
    .card-num {
      font-size: 0.68rem; font-weight: 700; color: #fff;
      background: #b8bcc8; border-radius: 4px;
      padding: 0.08rem 0.4rem; flex-shrink: 0; line-height: 1.5;
    }
    .result-card.processing .card-num { background: #4a6cf7; }
    .result-card.done       .card-num { background: #4aaf7a; }
    .result-card.error      .card-num { background: #e05c5c; }

    .card-badge { font-size: 0.72rem; color: #9a9aaa; }
    .card-badge.done  { color: #4aaf7a; font-weight: 500; }
    .card-badge.error { color: #e05c5c; font-weight: 500; }
    .card-origname {
      font-size: 0.73rem; color: #888;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-err-msg { font-size: 0.72rem; color: #e05c5c; margin-bottom: 0.4rem; display: block; }

    .fname-input {
      width: 100%; padding: 0.4rem 0.6rem; margin-bottom: 0.4rem;
      font-size: 0.79rem; font-family: 'Noto Sans KR', monospace, sans-serif;
      font-weight: 600; color: #1a1a2e;
      background: #f5f6ff; border: 1.5px solid #c8d0ff; border-radius: 6px;
      outline: none; transition: border-color 0.2s;
    }
    .fname-input:focus { border-color: #4a6cf7; background: #fff; }

    .mini-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.38rem; margin-bottom: 0.45rem;
    }
    .mini-group label { display: block; font-size: 0.63rem; color: #aaa; margin-bottom: 0.12rem; }
    .mini-input, .mini-select {
      width: 100%; padding: 0.32rem 0.48rem;
      font-size: 0.77rem; font-family: 'Noto Sans KR', sans-serif;
      color: #1a1a2e; background: #fff;
      border: 1.5px solid #e0e4f0; border-radius: 6px;
      outline: none; transition: border-color 0.2s;
    }
    .mini-input:focus, .mini-select:focus { border-color: #4a6cf7; }

    .btn-dl-sm {
      width: 100%; padding: 0.4rem;
      font-size: 0.77rem; color: white; font-weight: 500;
      background: #4a6cf7; border: none; border-radius: 6px;
      cursor: pointer; font-family: inherit; transition: background 0.2s;
    }
    .btn-dl-sm:hover { background: #3a5ce5; }

    /* ── ZIP 영역 ── */
    .zip-area {
      display: none; margin-top: 1.2rem; padding: 1.1rem;
      background: #f0fff8; border: 1px solid #b0e0c8; border-radius: 12px; text-align: center;
    }
    .zip-area.show { display: block; }
    .zip-summary { font-size: 0.82rem; color: #3a9a6a; margin-bottom: 0.75rem; font-weight: 500; }
    .btn-zip {
      padding: 0.78rem 2.2rem;
      background: #4aaf7a; color: white;
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.9rem; font-weight: 500;
      border: none; border-radius: 10px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.5rem;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-zip:hover:not(:disabled) { background: #3a9a6a; transform: translateY(-1px); }
    .btn-zip:disabled { background: #a8d8b8; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
<div class="card">
  <p class="card-title">영수증 자동 파일명 변환기</p>
  <p class="card-desc">최대 10장까지 업로드하면 Claude AI가 파일명을 자동 생성합니다</p>

  <!-- API 키 섹션 -->
  <div class="api-section">
    <label class="api-label" for="apiInput">Claude API 키</label>
    <div class="api-wrap">
      <input type="password" id="apiInput" class="api-input"
             placeholder="Claude API 키 입력" autocomplete="off" />
      <button type="button" id="btnEye" class="btn-eye" title="표시/숨김">👁</button>
    </div>
    <p class="api-error" id="apiError"></p>
  </div>

  <!-- 업로드 존 -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" multiple />
    <div class="upload-icon">🧾</div>
    <p class="upload-text">이미지를 드래그하거나 클릭 (최대 10장 동시 선택)</p>
    <p class="upload-hint">지원 형식: <span>JPG, PNG, WEBP</span></p>
  </div>

  <!-- 파일 카운트 바 -->
  <div class="count-bar" id="countBar">
    <span class="count-text" id="countText"></span>
    <button class="btn-reset" id="btnReset">✕ 초기화</button>
  </div>

  <!-- 자동생성 버튼 -->
  <div class="action-row" id="actionRow">
    <button class="btn-generate" id="btnGenerate">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">✦ 파일명 자동생성 시작</span>
    </button>
  </div>

  <!-- 전체 진행률 -->
  <div class="progress-area" id="progressArea">
    <p class="progress-status" id="progressStatus">준비 중...</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- 결과 카드 목록 -->
  <div class="result-list" id="resultList"></div>

  <!-- 전체 ZIP 다운로드 -->
  <div class="zip-area" id="zipArea">
    <p class="zip-summary" id="zipSummary"></p>
    <button class="btn-zip" id="btnZip">📦 전체 ZIP 다운로드</button>
  </div>
</div>

<script>
// ── 상수 ──────────────────────────────────────────────────────
const MAX_FILES   = 10;
const STORAGE_KEY = 'claude_api_key';
const CATEGORIES  = ['카페','식당','마트','주유소','교통수단','기타'];
const CLAUDE_URL  = 'https://api.anthropic.com/v1/messages';

// ── 요소 참조 ─────────────────────────────────────────────────
const apiInput      = document.getElementById('apiInput');
const btnEye        = document.getElementById('btnEye');
const apiError      = document.getElementById('apiError');
const uploadZone    = document.getElementById('uploadZone');
const fileInput     = document.getElementById('fileInput');
const countBar      = document.getElementById('countBar');
const countText     = document.getElementById('countText');
const btnReset      = document.getElementById('btnReset');
const actionRow     = document.getElementById('actionRow');
const btnGenerate   = document.getElementById('btnGenerate');
const spinner       = document.getElementById('spinner');
const btnText       = document.getElementById('btnText');
const progressArea  = document.getElementById('progressArea');
const progressStatus= document.getElementById('progressStatus');
const progressBar   = document.getElementById('progressBar');
const resultList    = document.getElementById('resultList');
const zipArea       = document.getElementById('zipArea');
const zipSummary    = document.getElementById('zipSummary');
const btnZip        = document.getElementById('btnZip');

// ── 상태 ──────────────────────────────────────────────────────
let results = [];

// ── API 키 localStorage 연동 ──────────────────────────────────
apiInput.value = localStorage.getItem(STORAGE_KEY) || '';
apiInput.addEventListener('input', () => {
  localStorage.setItem(STORAGE_KEY, apiInput.value);
  apiError.style.display = 'none';
});
btnEye.addEventListener('click', () => {
  const hidden = apiInput.type === 'password';
  apiInput.type = hidden ? 'text' : 'password';
  btnEye.textContent = hidden ? '🙈' : '👁';
});

// ── 유틸 ──────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
}
function sanitize(str) {
  return String(str||'').replace(/[\\/:*?"<>|\n\r]/g,'').trim();
}
function fileExt(file) {
  return (file.name.split('.').pop()||'jpg').toLowerCase();
}
function esc(str) {
  return String(str||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function buildFilename(r) {
  const date  = sanitize(r.date)  || todayStr();
  const store = sanitize(r.store) || '영수증';
  const amt   = String(r.amount||'0').replace(/\D/g,'') || '0';
  return `${date}_${store}_${r.category}_${amt}원.${fileExt(r.file)}`;
}

// ── 이미지 리사이즈 (API 전송용) ─────────────────────────────
async function resizeToBase64(file) {
  const dataUrl = await new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload  = e => resolve(e.target.result);
    fr.onerror = reject;
    fr.readAsDataURL(file);
  });
  const img = await new Promise((resolve, reject) => {
    const el = new Image();
    el.onload  = () => resolve(el);
    el.onerror = reject;
    el.src = dataUrl;
  });

  const MAX = 1500;
  let w = img.naturalWidth, h = img.naturalHeight;
  if (w > MAX || h > MAX) {
    if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
    else        { w = Math.round(w * MAX / h); h = MAX; }
  }

  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);

  // JPEG 변환 (용량 절감)
  return canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
}

// ── Claude Vision API 호출 ────────────────────────────────────
async function callClaude(file, apiKey) {
  const base64 = await resizeToBase64(file);
  const today  = todayStr();

  const prompt =
    `이 영수증 이미지를 분석해서 아래 JSON 형식으로만 답해줘. 다른 텍스트는 절대 포함하지 마.
{"date":"YYYYMMDD","store":"가게명(최대10자,특수문자제외)","category":"카페/식당/마트/주유소/교통수단/기타 중 하나","amount":"합계금액숫자만"}
- date: 날짜 못 찾으면 오늘 ${today} 사용
- store: 가게명 못 찾으면 영수증 표기
- amount: 합계/결제금액 기준, 못 찾으면 0`;

  const res = await fetch(CLAUDE_URL, {
    method: 'POST',
    headers: {
      'x-api-key':                            apiKey,
      'anthropic-version':                    '2023-06-01',
      'content-type':                         'application/json',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model:      'claude-sonnet-4-6',
      max_tokens: 256,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
          { type: 'text',  text: prompt },
        ]
      }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }

  const data    = await res.json();
  const rawText = data.content?.[0]?.text || '';

  // JSON 파싱 (마크다운 코드블록 제거 후)
  const clean = rawText.replace(/^```(?:json)?\n?/i,'').replace(/\n?```$/i,'').trim();
  const match = clean.match(/\{[\s\S]*?\}/);
  if (!match) throw new Error('응답 파싱 실패: ' + rawText.slice(0,80));

  const parsed = JSON.parse(match[0]);
  return {
    date:     String(parsed.date     || today),
    store:    String(parsed.store    || '영수증'),
    category: CATEGORIES.includes(parsed.category) ? parsed.category : '기타',
    amount:   String(parsed.amount   || '0').replace(/\D/g,'') || '0',
  };
}

// ── 카드 렌더링 ───────────────────────────────────────────────
function catOptions(selected) {
  return CATEGORIES.map(c =>
    `<option value="${c}"${c===selected?' selected':''}>${c}</option>`
  ).join('');
}

function renderCard(idx) {
  const r    = results[idx];
  const card = document.getElementById(`card-${idx}`);
  if (!card) return;

  card.className = `result-card ${r.status}`;

  if (r.status === 'pending' || r.status === 'processing') {
    card.innerHTML = `
      <img class="card-thumb" src="${r.thumbUrl}" alt="썸네일" />
      <div class="card-body">
        <div class="card-header">
          <span class="card-num">${idx+1}</span>
          ${r.status === 'processing'
            ? '<span class="spinner-sm"></span><span class="card-badge">AI 분석 중...</span>'
            : '<span class="card-badge">대기 중</span>'}
        </div>
        <p class="card-origname">${esc(r.file.name)}</p>
      </div>`;
    return;
  }

  card.innerHTML = `
    <img class="card-thumb" src="${r.thumbUrl}" alt="썸네일" />
    <div class="card-body">
      <div class="card-header">
        <span class="card-num">${idx+1}</span>
        <span class="card-badge ${r.status}">${r.status==='done' ? '✓ 완료' : '✕ 분석 실패'}</span>
      </div>
      ${r.status==='error'
        ? `<span class="card-err-msg">${esc(r.error)} — 직접 수정해주세요</span>` : ''}
      <input class="fname-input" type="text" value="${esc(r.filename)}" title="파일명 직접 수정 가능" />
      <div class="mini-grid">
        <div class="mini-group">
          <label>날짜</label>
          <input class="mini-input" data-f="date" type="text" value="${esc(r.date)}" maxlength="8" />
        </div>
        <div class="mini-group">
          <label>가게명</label>
          <input class="mini-input" data-f="store" type="text" value="${esc(r.store)}" />
        </div>
        <div class="mini-group">
          <label>업종</label>
          <select class="mini-select" data-f="category">${catOptions(r.category)}</select>
        </div>
        <div class="mini-group">
          <label>금액</label>
          <input class="mini-input" data-f="amount" type="text" value="${esc(r.amount)}" inputmode="numeric" />
        </div>
      </div>
      <button class="btn-dl-sm">⬇ 다운로드</button>
    </div>`;

  const fnameEl = card.querySelector('.fname-input');
  fnameEl.addEventListener('input', e => { r.filename = e.target.value; });

  card.querySelectorAll('[data-f]').forEach(el => {
    const refresh = () => {
      r.date     = card.querySelector('[data-f="date"]').value;
      r.store    = card.querySelector('[data-f="store"]').value;
      r.category = card.querySelector('[data-f="category"]').value;
      r.amount   = card.querySelector('[data-f="amount"]').value.replace(/\D/g,'');
      r.filename = buildFilename(r);
      fnameEl.value = r.filename;
    };
    el.addEventListener('input',  refresh);
    el.addEventListener('change', refresh);
  });

  card.querySelector('.btn-dl-sm').addEventListener('click', () => {
    const blobUrl = URL.createObjectURL(r.file);
    const a = document.createElement('a');
    a.href = blobUrl; a.download = r.filename; a.click();
    setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
  });
}

// ── 파일 선택 처리 ───────────────────────────────────────────
function handleFiles(fileList) {
  const images = Array.from(fileList).filter(f => f.type.startsWith('image/'));
  if (!images.length) return;

  if (images.length > MAX_FILES) {
    alert(`최대 ${MAX_FILES}장까지 가능합니다. 처음 ${MAX_FILES}장만 선택됩니다.`);
    images.splice(MAX_FILES);
  }

  results.forEach(r => URL.revokeObjectURL(r.thumbUrl));
  results = images.map(file => ({
    file, thumbUrl: URL.createObjectURL(file),
    status: 'pending',
    date: '', store: '영수증', category: '기타', amount: '0',
    filename: file.name, error: '',
  }));

  resultList.innerHTML = '';
  zipArea.classList.remove('show');
  progressArea.style.display = 'none';
  progressBar.style.width = '0%';

  results.forEach((_, idx) => {
    const div = document.createElement('div');
    div.id = `card-${idx}`;
    resultList.appendChild(div);
    renderCard(idx);
  });

  countText.textContent = `${results.length}장 선택됨`;
  countBar.classList.add('show');
  actionRow.classList.add('show');
  btnGenerate.disabled = false;
  btnText.textContent  = '✦ 파일명 자동생성 시작';
}

fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFiles(fileInput.files); });
uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

btnReset.addEventListener('click', () => {
  results.forEach(r => URL.revokeObjectURL(r.thumbUrl));
  results = [];
  fileInput.value = '';
  resultList.innerHTML = '';
  countBar.classList.remove('show');
  actionRow.classList.remove('show');
  zipArea.classList.remove('show');
  progressArea.style.display = 'none';
  progressBar.style.width = '0%';
});

// ── 배치 분석 실행 ────────────────────────────────────────────
btnGenerate.addEventListener('click', async () => {
  if (!results.length) return;

  const apiKey = apiInput.value.trim();
  if (!apiKey) {
    apiError.textContent = 'API 키를 먼저 입력해주세요';
    apiError.style.display = 'block';
    apiInput.focus();
    return;
  }
  apiError.style.display = 'none';

  btnGenerate.disabled  = true;
  spinner.style.display = 'block';
  btnText.textContent   = '분석 중...';
  progressArea.style.display = 'block';
  progressBar.style.width = '0%';
  zipArea.classList.remove('show');

  const total = results.length;
  let doneCount = 0;

  for (let i = 0; i < total; i++) {
    const r = results[i];
    r.status = 'processing';
    renderCard(i);

    progressBar.style.width = `${Math.round((i / total) * 100)}%`;
    progressStatus.textContent = `${i+1}/${total} 분석 중... — ${r.file.name}`;

    try {
      const parsed = await callClaude(r.file, apiKey);
      r.date     = parsed.date;
      r.store    = parsed.store;
      r.category = parsed.category;
      r.amount   = parsed.amount;
      r.filename = buildFilename(r);
      r.status   = 'done';
      doneCount++;
    } catch (err) {
      r.error    = err.message || '알 수 없는 오류';
      r.filename = `${todayStr()}_영수증_기타_0원.${fileExt(r.file)}`;
      r.status   = 'error';
    }

    renderCard(i);
  }

  progressBar.style.width = '100%';
  progressStatus.textContent = `완료! ${doneCount}/${total}장 분석 성공`;
  btnGenerate.disabled  = false;
  spinner.style.display = 'none';
  btnText.textContent   = '↺ 다시 분석하기';

  const failCount = total - doneCount;
  zipSummary.textContent =
    `총 ${total}장 중 ${doneCount}장 분석 완료${failCount ? ` (실패 ${failCount}장)` : ''}`;
  zipArea.classList.add('show');
});

// ── 전체 ZIP 다운로드 ────────────────────────────────────────
btnZip.addEventListener('click', async () => {
  btnZip.disabled = true;
  btnZip.textContent = '압축 중...';

  try {
    const zip = new JSZip();
    const nameCount = {};

    for (const r of results) {
      if (r.status !== 'done') continue;
      let fname = r.filename;
      if (nameCount[fname]) {
        const dot = fname.lastIndexOf('.');
        fname = `${fname.slice(0,dot)}_${nameCount[fname]}${fname.slice(dot)}`;
      }
      nameCount[r.filename] = (nameCount[r.filename] || 1) + 1;
      zip.file(fname, r.file);
    }

    const blob = await zip.generateAsync({ type: 'blob' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `영수증_${todayStr()}.zip`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (err) {
    alert('ZIP 생성 실패: ' + err.message);
  }

  btnZip.disabled = false;
  btnZip.textContent = '📦 전체 ZIP 다운로드';
});
</script>
